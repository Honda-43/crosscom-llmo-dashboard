name: daily

on:
  schedule:
    # 07:00 JST = 22:00 UTC (previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: llmo-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SHEET_ID: ${{ secrets.SHEET_ID }}
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline (LLM -> extract -> Sheets, GA4, GSC)
        id: pipeline
        working-directory: src
        run: python run_daily.py

      - name: Commit new raw LLM answers
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw
          if git diff --cached --quiet; then
            echo "No new raw files to commit."
          else
            git commit -m "data: LLM raw answers $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Report failure
        if: failure()
        run: echo "::warning::One or more daily pipeline phases failed — see the job summary."
